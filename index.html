<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Obertauern Sport Team-App</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#15171C" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Team-App" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin:0; padding:0; background:#15171C; }
  * { box-sizing: border-box; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #2A2E38; border-radius: 4px; }
  button:focus-visible, input:focus-visible { outline: 2px solid #E8A33D; outline-offset: 2px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const TOKEN_KEY = "team-app-admin-token";
const NAME_KEY = "team-app-admin-name";

const COLORS = {
  bg: "#15171C", panel: "#1C1F26", panelBorder: "#2A2E38",
  accent: "#E8A33D", accent2: "#4DA8A0", text: "#E9EAEC",
  textDim: "#8C919E", danger: "#D5694B",
};

const todayISO = () => new Date().toISOString().slice(0, 10);

function fmtDuration(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  return `${h}h ${m.toString().padStart(2, "0")}m`;
}
function fmtClock(ts) {
  return new Date(ts).toLocaleTimeString("de-AT", { hour: "2-digit", minute: "2-digit" });
}
function fmtDateShort(iso) {
  return new Date(iso + "T00:00:00").toLocaleDateString("de-AT", { weekday: "short", day: "2-digit", month: "2-digit" });
}
function weekRangeFor(iso) {
  const d = new Date(iso + "T00:00:00");
  const day = d.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(d);
  monday.setDate(d.getDate() + diffToMonday);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    days.push(dt.toISOString().slice(0, 10));
  }
  return days;
}
function downloadCSV(filename, rows) {
  const csv = rows.map((r) => r.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// --- API helper ---
async function api(path, { method = "GET", body, token } = {}) {
  const headers = { "Content-Type": "application/json" };
  if (token) headers.Authorization = "Bearer " + token;
  const res = await fetch("/api" + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || "Fehler bei der Anfrage.");
  return data;
}

const TABS = [
  { id: "zeit", label: "Zeiterfassung", icon: "🕒" },
  { id: "todos", label: "To-Dos", icon: "✅" },
  { id: "workflow", label: "Workflow", icon: "📋" },
];
const WORKFLOW_COLS = [
  { id: "offen", label: "Offen" },
  { id: "arbeit", label: "In Bearbeitung" },
  { id: "fertig", label: "Erledigt" },
];

function Panel({ children, className = "" }) {
  return (
    <div className={`rounded-xl p-4 ${className}`} style={{ background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }}>
      {children}
    </div>
  );
}

function Modal({ children }) {
  return (
    <div className="fixed inset-0 flex items-center justify-center z-50 px-4" style={{ background: "rgba(0,0,0,0.6)" }}>
      <Panel className="w-full max-w-xs">{children}</Panel>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");
  const [tab, setTab] = useState("zeit");
  const [employees, setEmployees] = useState([]);
  const [timeEntries, setTimeEntries] = useState([]);
  const [todos, setTodos] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [activeEmployee, setActiveEmployee] = useState(null);
  const [newEmployeeName, setNewEmployeeName] = useState("");
  const [showAddEmployee, setShowAddEmployee] = useState(false);

  const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY) || null);
  const [adminName, setAdminName] = useState(() => localStorage.getItem(NAME_KEY) || null);
  const [adminCount, setAdminCount] = useState(0);
  const isAdmin = !!adminName;

  const [authView, setAuthView] = useState(null); // null | "setup" | "login" | "manage"
  const [authName, setAuthName] = useState("");
  const [authPin, setAuthPin] = useState("");
  const [authError, setAuthError] = useState("");
  const [adminList, setAdminList] = useState([]);
  const [newAdminName, setNewAdminName] = useState("");
  const [newAdminPin, setNewAdminPin] = useState("");

  const refresh = useCallback(async () => {
    try {
      const data = await api("/state", { token });
      setEmployees(data.employees || []);
      setTimeEntries(data.timeEntries || []);
      setTodos(data.todos || []);
      setTasks(data.tasks || []);
      setAdminCount(data.adminCount || 0);
      if (data.employees && data.employees.length && !activeEmployee) setActiveEmployee(data.employees[0].id);
      if (!data.isAdmin && adminName) {
        // token invalid/expired
        setAdminName(null); setToken(null);
        localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(NAME_KEY);
      }
    } catch (e) {
      setError("Verbindung zum Server fehlgeschlagen.");
    }
    setLoading(false);
  }, [token, activeEmployee, adminName]);

  useEffect(() => { refresh(); }, []);
  useEffect(() => {
    const id = setInterval(refresh, 5000); // leichtes Polling für geteilte Daten
    return () => clearInterval(id);
  }, [refresh]);

  function openAdminFlow() {
    setAuthError(""); setAuthName(""); setAuthPin("");
    setAuthView(adminCount === 0 ? "setup" : "login");
  }

  function logoutAdmin() {
    setAdminName(null); setToken(null);
    localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(NAME_KEY);
  }

  async function submitSetup() {
    setAuthError("");
    if (authName.trim().length < 2 || authPin.trim().length < 4) {
      setAuthError("Name (min. 2) und PIN (min. 4 Zeichen) erforderlich."); return;
    }
    try {
      const res = await api("/admin/setup", { method: "POST", body: { name: authName.trim(), pin: authPin.trim() } });
      setToken(res.token); setAdminName(res.name);
      localStorage.setItem(TOKEN_KEY, res.token); localStorage.setItem(NAME_KEY, res.name);
      setAuthView(null); refresh();
    } catch (e) { setAuthError(e.message); }
  }

  async function submitLogin() {
    setAuthError("");
    try {
      const res = await api("/admin/login", { method: "POST", body: { name: authName.trim(), pin: authPin.trim() } });
      setToken(res.token); setAdminName(res.name);
      localStorage.setItem(TOKEN_KEY, res.token); localStorage.setItem(NAME_KEY, res.name);
      setAuthView(null); refresh();
    } catch (e) { setAuthError(e.message); }
  }

  async function openManage() {
    setAuthView("manage");
    try {
      const res = await api("/admin/list", { token });
      setAdminList(res.admins || []);
    } catch (e) { setAuthError(e.message); }
  }

  async function addAdmin() {
    setAuthError("");
    if (newAdminName.trim().length < 2 || newAdminPin.trim().length < 4) {
      setAuthError("Name (min. 2) und PIN (min. 4 Zeichen) erforderlich."); return;
    }
    try {
      const res = await api("/admin/add", { method: "POST", token, body: { name: newAdminName.trim(), pin: newAdminPin.trim() } });
      setAdminList(res.admins || []);
      setNewAdminName(""); setNewAdminPin("");
      setAdminCount(res.admins.length);
    } catch (e) { setAuthError(e.message); }
  }

  async function removeAdmin(id) {
    setAuthError("");
    try {
      const res = await api("/admin/" + id, { method: "DELETE", token });
      setAdminList(res.admins || []);
      setAdminCount(res.admins.length);
    } catch (e) { setAuthError(e.message); }
  }

  async function addEmployee() {
    const name = newEmployeeName.trim();
    if (!name) return;
    try {
      const emp = await api("/employees", { method: "POST", body: { name } });
      setEmployees((prev) => [...prev, emp]);
      setActiveEmployee(emp.id);
      setNewEmployeeName(""); setShowAddEmployee(false);
    } catch (e) { setError(e.message); }
  }
  async function removeEmployee(id) {
    if (!isAdmin) return;
    try {
      await api("/employees/" + id, { method: "DELETE", token });
      setEmployees((prev) => prev.filter((e) => e.id !== id));
      setTimeEntries((prev) => prev.filter((e) => e.employeeId !== id));
      setTodos((prev) => prev.filter((t) => t.employeeId !== id));
      if (activeEmployee === id) setActiveEmployee(null);
    } catch (e) { setError(e.message); }
  }
  async function clockIn(employeeId) {
    try {
      const entry = await api("/time/clockin", { method: "POST", body: { employeeId } });
      setTimeEntries((prev) => [...prev, entry]);
    } catch (e) { setError(e.message); }
  }
  async function clockOut(employeeId) {
    try {
      const entry = await api("/time/clockout", { method: "POST", body: { employeeId } });
      setTimeEntries((prev) => prev.map((e) => (e.id === entry.id ? entry : e)));
    } catch (e) { setError(e.message); }
  }
  async function deleteTimeEntry(id) {
    if (!isAdmin) return;
    try {
      await api("/time/" + id, { method: "DELETE", token });
      setTimeEntries((prev) => prev.filter((e) => e.id !== id));
    } catch (e) { setError(e.message); }
  }
  async function addTodo(employeeId, text, due) {
    if (!text.trim()) return;
    try {
      const todo = await api("/todos", { method: "POST", body: { employeeId, text, due } });
      setTodos((prev) => [...prev, todo]);
    } catch (e) { setError(e.message); }
  }
  async function toggleTodo(id) {
    try {
      const todo = await api("/todos/" + id + "/toggle", { method: "PATCH" });
      setTodos((prev) => prev.map((t) => (t.id === id ? todo : t)));
    } catch (e) { setError(e.message); }
  }
  async function deleteTodo(id) {
    if (!isAdmin) return;
    try {
      await api("/todos/" + id, { method: "DELETE", token });
      setTodos((prev) => prev.filter((t) => t.id !== id));
    } catch (e) { setError(e.message); }
  }
  async function addTask(title, employeeId) {
    if (!title.trim()) return;
    try {
      const task = await api("/tasks", { method: "POST", body: { title, employeeId } });
      setTasks((prev) => [...prev, task]);
    } catch (e) { setError(e.message); }
  }
  async function moveTask(id, status) {
    try {
      const task = await api("/tasks/" + id + "/move", { method: "PATCH", body: { status } });
      setTasks((prev) => prev.map((t) => (t.id === id ? task : t)));
    } catch (e) { setError(e.message); }
  }
  async function deleteTask(id) {
    if (!isAdmin) return;
    try {
      await api("/tasks/" + id, { method: "DELETE", token });
      setTasks((prev) => prev.filter((t) => t.id !== id));
    } catch (e) { setError(e.message); }
  }

  if (loading) {
    return (
      <div style={{ background: COLORS.bg, color: COLORS.text }} className="min-h-screen flex items-center justify-center">
        <div className="spin" style={{ width: 28, height: 28, border: `3px solid ${COLORS.panelBorder}`, borderTopColor: COLORS.accent, borderRadius: "50%" }} />
      </div>
    );
  }

  return (
    <div style={{ background: COLORS.bg, color: COLORS.text, minHeight: "100vh" }} className="font-sans">
      <div className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
        <header className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-xl font-semibold tracking-tight">Obertauern Sport Team-App</h1>
            <p className="text-sm" style={{ color: COLORS.textDim }}>Zeiterfassung · To-Dos · Workflow</p>
          </div>
          <div className="flex items-center gap-2">
            {isAdmin && (
              <button onClick={openManage} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium" style={{ border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textDim }}>
                👥 Admins
              </button>
            )}
            <button
              onClick={() => (isAdmin ? logoutAdmin() : openAdminFlow())}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium"
              style={{ background: isAdmin ? COLORS.accent + "22" : COLORS.panel, border: `1px solid ${isAdmin ? COLORS.accent : COLORS.panelBorder}`, color: isAdmin ? COLORS.accent : COLORS.textDim }}
            >
              {isAdmin ? `🔓 ${adminName}` : "🔒 Admin"}
            </button>
          </div>
        </header>

        {error && (
          <div className="mb-4 px-3 py-2 rounded-lg text-xs" style={{ background: COLORS.danger + "22", border: `1px solid ${COLORS.danger}`, color: COLORS.danger }}>
            {error} <button onClick={() => setError("")} className="ml-2 underline">schließen</button>
          </div>
        )}

        {authView === "setup" && (
          <Modal>
            <h3 className="text-sm font-medium mb-1">Ersten Admin einrichten</h3>
            <p className="text-xs mb-3" style={{ color: COLORS.textDim }}>Es gibt noch keinen Admin. Lege deinen Namen und eine PIN (4+ Zeichen) fest.</p>
            <input placeholder="Name" value={authName} onChange={(e) => setAuthName(e.target.value)} className="w-full px-3 py-2 rounded-lg text-sm mb-2" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            <input placeholder="PIN" type="password" value={authPin} onChange={(e) => setAuthPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submitSetup()} className="w-full px-3 py-2 rounded-lg text-sm mb-3" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            {authError && <p className="text-xs mb-2" style={{ color: COLORS.danger }}>{authError}</p>}
            <div className="flex gap-2">
              <button onClick={submitSetup} className="flex-1 py-2 rounded-lg text-sm font-medium" style={{ background: COLORS.accent, color: "#1A1A1A" }}>Einrichten</button>
              <button onClick={() => setAuthView(null)} className="px-4 py-2 rounded-lg text-sm" style={{ border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textDim }}>Abbrechen</button>
            </div>
          </Modal>
        )}

        {authView === "login" && (
          <Modal>
            <h3 className="text-sm font-medium mb-3">Admin-Login</h3>
            <input placeholder="Name" value={authName} onChange={(e) => setAuthName(e.target.value)} className="w-full px-3 py-2 rounded-lg text-sm mb-2" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            <input placeholder="PIN" type="password" value={authPin} onChange={(e) => setAuthPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submitLogin()} className="w-full px-3 py-2 rounded-lg text-sm mb-3" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            {authError && <p className="text-xs mb-2" style={{ color: COLORS.danger }}>{authError}</p>}
            <div className="flex gap-2">
              <button onClick={submitLogin} className="flex-1 py-2 rounded-lg text-sm font-medium" style={{ background: COLORS.accent, color: "#1A1A1A" }}>Einloggen</button>
              <button onClick={() => setAuthView(null)} className="px-4 py-2 rounded-lg text-sm" style={{ border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textDim }}>Abbrechen</button>
            </div>
          </Modal>
        )}

        {authView === "manage" && (
          <Modal>
            <h3 className="text-sm font-medium mb-3">Admins verwalten</h3>
            <div className="space-y-1.5 mb-3 max-h-32 overflow-y-auto scrollbar-thin">
              {adminList.map((a) => (
                <div key={a.id} className="flex items-center justify-between text-sm px-2.5 py-1.5 rounded-lg" style={{ background: COLORS.bg }}>
                  <span>{a.name}</span>
                  {adminList.length > 1 && <button onClick={() => removeAdmin(a.id)} style={{ color: COLORS.danger }}>🗑</button>}
                </div>
              ))}
            </div>
            <p className="text-xs mb-1" style={{ color: COLORS.textDim }}>Neuen Admin hinzufügen (max. 5):</p>
            <input placeholder="Name" value={newAdminName} onChange={(e) => setNewAdminName(e.target.value)} className="w-full px-3 py-2 rounded-lg text-sm mb-2" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            <input placeholder="PIN" type="password" value={newAdminPin} onChange={(e) => setNewAdminPin(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addAdmin()} className="w-full px-3 py-2 rounded-lg text-sm mb-3" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
            {authError && <p className="text-xs mb-2" style={{ color: COLORS.danger }}>{authError}</p>}
            <div className="flex gap-2">
              <button onClick={addAdmin} className="flex-1 py-2 rounded-lg text-sm font-medium" style={{ background: COLORS.accent, color: "#1A1A1A" }}>Hinzufügen</button>
              <button onClick={() => setAuthView(null)} className="px-4 py-2 rounded-lg text-sm" style={{ border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textDim }}>Schließen</button>
            </div>
          </Modal>
        )}

        <nav className="flex gap-1 mb-6 p-1 rounded-xl" style={{ background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }}>
          {TABS.map(({ id, label, icon }) => (
            <button key={id} onClick={() => setTab(id)}
              className="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-sm font-medium transition-colors"
              style={{ background: tab === id ? COLORS.accent : "transparent", color: tab === id ? "#1A1A1A" : COLORS.textDim }}>
              <span>{icon}</span><span className="hidden sm:inline">{label}</span>
            </button>
          ))}
        </nav>

        <div className="flex items-center gap-2 mb-6 flex-wrap">
          {employees.map((e) => (
            <div key={e.id} className="flex items-center gap-1.5 pl-3 pr-2 py-1.5 rounded-full text-sm group"
              style={{ background: activeEmployee === e.id ? COLORS.accent2 + "22" : COLORS.panel, border: `1px solid ${activeEmployee === e.id ? COLORS.accent2 : COLORS.panelBorder}`, color: activeEmployee === e.id ? COLORS.accent2 : COLORS.text }}>
              <button onClick={() => setActiveEmployee(e.id)} className="flex items-center gap-1.5">👤 {e.name}</button>
              {isAdmin && <button onClick={() => removeEmployee(e.id)} style={{ color: COLORS.textDim }} aria-label={`${e.name} entfernen`}>✕</button>}
            </div>
          ))}
          {showAddEmployee ? (
            <div className="flex items-center gap-1">
              <input autoFocus value={newEmployeeName} onChange={(ev) => setNewEmployeeName(ev.target.value)}
                onKeyDown={(ev) => ev.key === "Enter" && addEmployee()} placeholder="Name"
                className="px-3 py-1.5 rounded-full text-sm" style={{ background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
              <button onClick={addEmployee} className="p-1.5 rounded-full" style={{ background: COLORS.accent, color: "#1A1A1A" }}>+</button>
            </div>
          ) : (
            <button onClick={() => setShowAddEmployee(true)} className="flex items-center gap-1 px-3 py-1.5 rounded-full text-sm"
              style={{ border: `1px dashed ${COLORS.panelBorder}`, color: COLORS.textDim }}>+ Mitarbeiter</button>
          )}
        </div>

        {employees.length === 0 && (
          <p className="text-sm mb-6" style={{ color: COLORS.textDim }}>Füge zuerst Mitarbeiter hinzu, um loszulegen.</p>
        )}

        {tab === "zeit" && <ZeitTab employees={employees} timeEntries={timeEntries} clockIn={clockIn} clockOut={clockOut} deleteTimeEntry={deleteTimeEntry} isAdmin={isAdmin} />}
        {tab === "todos" && <TodosTab employees={employees} todos={todos} activeEmployee={activeEmployee} addTodo={addTodo} toggleTodo={toggleTodo} deleteTodo={deleteTodo} isAdmin={isAdmin} />}
        {tab === "workflow" && <WorkflowTab employees={employees} tasks={tasks} addTask={addTask} moveTask={moveTask} deleteTask={deleteTask} isAdmin={isAdmin} />}
      </div>
    </div>
  );
}

function ZeitTab({ employees, timeEntries, clockIn, clockOut, deleteTimeEntry, isAdmin }) {
  const [, setTick] = useState(0);
  const [view, setView] = useState("tag");
  useEffect(() => { const id = setInterval(() => setTick((t) => t + 1), 1000); return () => clearInterval(id); }, []);
  const today = todayISO();
  const week = weekRangeFor(today);

  function exportCSV() {
    const rows = [["Mitarbeiter", "Datum", "Start", "Ende", "Dauer (Min)"]];
    timeEntries.slice().sort((a, b) => a.start - b.start).forEach((e) => {
      const emp = employees.find((em) => em.id === e.employeeId);
      const durMin = Math.round(((e.end || Date.now()) - e.start) / 60000);
      rows.push([emp ? emp.name : "Unbekannt", e.date, fmtClock(e.start), e.end ? fmtClock(e.end) : "läuft", durMin]);
    });
    downloadCSV(`zeiterfassung_${today}.csv`, rows);
  }

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div className="flex gap-1 p-1 rounded-lg" style={{ background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }}>
          <button onClick={() => setView("tag")} className="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium"
            style={{ background: view === "tag" ? COLORS.accent : "transparent", color: view === "tag" ? "#1A1A1A" : COLORS.textDim }}>🗓 Heute</button>
          <button onClick={() => setView("woche")} className="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium"
            style={{ background: view === "woche" ? COLORS.accent : "transparent", color: view === "woche" ? "#1A1A1A" : COLORS.textDim }}>📆 Woche</button>
        </div>
        <button onClick={exportCSV} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium" style={{ border: `1px solid ${COLORS.panelBorder}`, color: COLORS.textDim }}>⬇ CSV exportieren</button>
      </div>

      {view === "tag" ? (
        <div className="grid sm:grid-cols-2 gap-4">
          {employees.map((emp) => {
            const running = timeEntries.find((e) => e.employeeId === emp.id && e.end === null);
            const todaysEntries = timeEntries.filter((e) => e.employeeId === emp.id && e.date === today).sort((a, b) => b.start - a.start);
            const todayTotal = todaysEntries.reduce((sum, e) => sum + ((e.end || Date.now()) - e.start), 0);
            return (
              <Panel key={emp.id}>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="font-medium">{emp.name}</h3>
                  <span className="text-xs" style={{ color: COLORS.textDim }}>Heute: {fmtDuration(todayTotal)}</span>
                </div>
                {running ? (
                  <button onClick={() => clockOut(emp.id)} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-medium mb-3" style={{ background: COLORS.danger, color: "#fff" }}>■ Stoppen · {fmtDuration(Date.now() - running.start)}</button>
                ) : (
                  <button onClick={() => clockIn(emp.id)} className="w-full flex items-center justify-center gap-2 py-2.5 rounded-lg text-sm font-medium mb-3" style={{ background: COLORS.accent2, color: "#0E1411" }}>▶ Starten</button>
                )}
                <div className="space-y-1.5 max-h-36 overflow-y-auto scrollbar-thin">
                  {todaysEntries.length === 0 && <p className="text-xs" style={{ color: COLORS.textDim }}>Noch keine Einträge heute.</p>}
                  {todaysEntries.map((e) => (
                    <div key={e.id} className="flex items-center justify-between text-xs px-2.5 py-1.5 rounded-lg group" style={{ background: COLORS.bg }}>
                      <span style={{ color: COLORS.textDim }}>{fmtClock(e.start)} – {e.end ? fmtClock(e.end) : "läuft"}</span>
                      <span className="flex items-center gap-2">
                        {fmtDuration((e.end || Date.now()) - e.start)}
                        {isAdmin && <button onClick={() => deleteTimeEntry(e.id)} style={{ color: COLORS.danger }}>🗑</button>}
                      </span>
                    </div>
                  ))}
                </div>
              </Panel>
            );
          })}
        </div>
      ) : (
        <div className="space-y-4">
          {employees.map((emp) => {
            const dayTotals = week.map((d) => timeEntries.filter((e) => e.employeeId === emp.id && e.date === d).reduce((sum, e) => sum + ((e.end || Date.now()) - e.start), 0));
            const weekTotal = dayTotals.reduce((a, b) => a + b, 0);
            const maxDay = Math.max(...dayTotals, 1);
            return (
              <Panel key={emp.id}>
                <div className="flex items-center justify-between mb-3">
                  <h3 className="font-medium">{emp.name}</h3>
                  <span className="text-xs" style={{ color: COLORS.textDim }}>Woche: {fmtDuration(weekTotal)}</span>
                </div>
                <div className="grid grid-cols-7 gap-2">
                  {week.map((d, i) => (
                    <div key={d} className="flex flex-col items-center gap-1">
                      <div className="w-full rounded-md flex items-end justify-center" style={{ height: 56, background: COLORS.bg }}>
                        <div className="w-full rounded-md" style={{ height: `${Math.max((dayTotals[i] / maxDay) * 100, dayTotals[i] > 0 ? 8 : 0)}%`, background: d === today ? COLORS.accent : COLORS.accent2 }} />
                      </div>
                      <span className="text-[10px]" style={{ color: COLORS.textDim }}>{fmtDateShort(d).split(" ")[0]}</span>
                      <span className="text-[10px]" style={{ color: COLORS.textDim }}>{dayTotals[i] > 0 ? fmtDuration(dayTotals[i]) : "–"}</span>
                    </div>
                  ))}
                </div>
              </Panel>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TodosTab({ employees, todos, activeEmployee, addTodo, toggleTodo, deleteTodo, isAdmin }) {
  const [text, setText] = useState("");
  const [due, setDue] = useState("");
  const [forEmployee, setForEmployee] = useState(activeEmployee);
  useEffect(() => setForEmployee(activeEmployee), [activeEmployee]);
  const sorted = [...todos].sort((a, b) => Number(a.done) - Number(b.done));
  function submit() { if (!forEmployee) return; addTodo(forEmployee, text, due); setText(""); setDue(""); }

  return (
    <div>
      <Panel className="mb-4">
        <div className="flex flex-col sm:flex-row gap-2">
          <select value={forEmployee || ""} onChange={(e) => setForEmployee(e.target.value)} className="px-3 py-2 rounded-lg text-sm" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }}>
            <option value="" disabled>Mitarbeiter</option>
            {employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
          <input value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="Neue Aufgabe..." className="flex-1 px-3 py-2 rounded-lg text-sm" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
          <input type="date" value={due} onChange={(e) => setDue(e.target.value)} className="px-3 py-2 rounded-lg text-sm" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
          <button onClick={submit} className="flex items-center justify-center gap-1 px-4 py-2 rounded-lg text-sm font-medium" style={{ background: COLORS.accent, color: "#1A1A1A" }}>+ Hinzufügen</button>
        </div>
      </Panel>
      <div className="space-y-2">
        {sorted.length === 0 && <p className="text-sm" style={{ color: COLORS.textDim }}>Keine Aufgaben vorhanden.</p>}
        {sorted.map((t) => {
          const emp = employees.find((e) => e.id === t.employeeId);
          return (
            <Panel key={t.id} className="flex items-center justify-between py-2.5">
              <div className="flex items-center gap-3">
                <button onClick={() => toggleTodo(t.id)} className="w-5 h-5 rounded-md flex items-center justify-center flex-shrink-0" style={{ border: `1.5px solid ${t.done ? COLORS.accent2 : COLORS.panelBorder}`, background: t.done ? COLORS.accent2 : "transparent" }}>
                  {t.done && <span style={{ color: "#0E1411", fontSize: 11 }}>✓</span>}
                </button>
                <div>
                  <p className="text-sm" style={{ textDecoration: t.done ? "line-through" : "none", color: t.done ? COLORS.textDim : COLORS.text }}>{t.text}</p>
                  <div className="flex items-center gap-2 text-xs mt-0.5" style={{ color: COLORS.textDim }}>
                    {emp && <span>👤 {emp.name}</span>}
                    {t.due && <span>📅 {t.due}</span>}
                  </div>
                </div>
              </div>
              {isAdmin && <button onClick={() => deleteTodo(t.id)} style={{ color: COLORS.textDim }}>🗑</button>}
            </Panel>
          );
        })}
      </div>
    </div>
  );
}

function WorkflowTab({ employees, tasks, addTask, moveTask, deleteTask, isAdmin }) {
  const [title, setTitle] = useState("");
  const [assignee, setAssignee] = useState("");
  function submit() { addTask(title, assignee || null); setTitle(""); }

  return (
    <div>
      <Panel className="mb-4">
        <div className="flex flex-col sm:flex-row gap-2">
          <input value={title} onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} placeholder="Neue Aufgabe für den Workflow..." className="flex-1 px-3 py-2 rounded-lg text-sm" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }} />
          <select value={assignee} onChange={(e) => setAssignee(e.target.value)} className="px-3 py-2 rounded-lg text-sm" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}`, color: COLORS.text }}>
            <option value="">Unzugewiesen</option>
            {employees.map((e) => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
          <button onClick={submit} className="flex items-center justify-center gap-1 px-4 py-2 rounded-lg text-sm font-medium" style={{ background: COLORS.accent, color: "#1A1A1A" }}>+ Hinzufügen</button>
        </div>
      </Panel>
      <div className="grid sm:grid-cols-3 gap-4">
        {WORKFLOW_COLS.map((col) => {
          const colTasks = tasks.filter((t) => t.status === col.id);
          return (
            <div key={col.id} className="rounded-xl p-3" style={{ background: COLORS.panel, border: `1px solid ${COLORS.panelBorder}` }}>
              <div className="flex items-center justify-between mb-3">
                <h4 className="text-sm font-medium">{col.label}</h4>
                <span className="text-xs px-1.5 py-0.5 rounded-full" style={{ background: COLORS.bg, color: COLORS.textDim }}>{colTasks.length}</span>
              </div>
              <div className="space-y-2 min-h-[60px]">
                {colTasks.map((t) => {
                  const emp = employees.find((e) => e.id === t.employeeId);
                  const nextCol = WORKFLOW_COLS[WORKFLOW_COLS.findIndex((c) => c.id === col.id) + 1];
                  return (
                    <div key={t.id} className="p-2.5 rounded-lg group" style={{ background: COLORS.bg, border: `1px solid ${COLORS.panelBorder}` }}>
                      <p className="text-sm mb-1.5">{t.title}</p>
                      <div className="flex items-center justify-between">
                        <span className="text-xs flex items-center gap-1" style={{ color: COLORS.textDim }}>{emp ? <>👤 {emp.name}</> : "Unzugewiesen"}</span>
                        <div className="flex items-center gap-1.5">
                          {nextCol && <button onClick={() => moveTask(t.id, nextCol.id)} title={`Nach "${nextCol.label}" verschieben`} style={{ color: COLORS.accent2 }}>›</button>}
                          {isAdmin && <button onClick={() => deleteTask(t.id)} style={{ color: COLORS.danger }}>🗑</button>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
